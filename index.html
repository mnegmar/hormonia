<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HormonIA - Tutor de Estética Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #db2777; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .chat-container { height: calc(100vh - 140px); background-color: #f8fafc; }
        .message-bubble { 
            max-width: 85%; 
            border-radius: 18px; 
            line-height: 1.5; 
            word-wrap: break-word;
            margin-bottom: 8px;
        }
        .user-msg { 
            background-color: #fce7f3; 
            color: #831843; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            padding: 12px 16px;
        }
        .bot-msg { 
            background-color: #ffffff; 
            color: #1f2937; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }
        .bot-msg b, .bot-msg strong { color: var(--main-color); font-weight: 600; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--main-color); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .message-bubble { animation: fadeIn 0.3s ease-out; }
        #chat-box { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-white font-sans">

    <div class="flex flex-col h-screen max-w-4xl mx-auto shadow-xl">
        <!-- Header -->
        <header class="bg-pink-600 p-4 text-white flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-full flex items-center justify-center w-10 h-10 shadow-sm">
                    <i class="fas fa-robot text-pink-600"></i>
                </div>
                <div>
                    <h1 class="font-bold text-base m-0 leading-tight">HormonIA</h1>
                    <p class="text-[10px] opacity-90 m-0 uppercase tracking-tighter">Tutor de Estética Profesional</p>
                </div>
            </div>
            <button onclick="clearChat()" class="text-white hover:text-pink-200 p-2" title="Limpiar conversación">
                <i class="fas fa-redo-alt"></i>
            </button>
        </header>

        <!-- Chat Area -->
        <div id="chat-box" class="chat-container overflow-y-auto p-4 flex flex-col gap-2">
            <div class="bot-msg message-bubble shadow-sm text-sm">
                ¡Hola! Soy <b>HormonIA</b>. Estoy lista para resolver tus dudas sobre el manual del sistema hormonal. 
                <br><br>
                Pregúntame sobre el <b>metabolismo</b>, el <b>estrés</b> o el <b>envejecimiento hormonal</b>.
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white border-t border-gray-200 shrink-0">
            <div class="flex gap-2 items-center">
                <input type="text" id="user-input" 
                       class="flex-1 border border-gray-300 rounded-full px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-pink-500 text-sm" 
                       placeholder="Escribe tu consulta...">
                <button onclick="sendMessage()" id="send-btn"
                        class="bg-pink-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-pink-700 transition active:scale-90 shadow-md">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
            <div class="text-[9px] text-center text-gray-400 mt-2">Uso académico exclusivo para Estética Integral</div>
        </div>
    </div>

    <script>
        const apiKey = ""; // La clave se inyectará automáticamente
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        const systemPrompt = `Eres HormonIA, una IA tutora especializada en el sistema endocrino para estudiantes de Estética.
        Tu conocimiento proviene del manual de estudio proporcionado.
        
        REGLAS DE RESPUESTA:
        - NUNCA uses Markdown (sin asteriscos, sin almohadillas).
        - Usa SOLO etiquetas HTML: <b> para resaltar términos importantes, <br> para saltos de línea.
        - Si necesitas listar, usa guiones de texto normales con <br>.
        - Mantén las respuestas cortas, directas y profesionales.
        - Enfoque: Piel, envejecimiento (inflammaging), cortisol, insulina y gónadas.
        - Si hay una patología, recomienda siempre acudir al médico endocrino.`;

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            appendMessage(query, 'user-msg');
            userInput.value = '';
            
            const loadingId = addLoadingIndicator();

            try {
                const response = await fetchWithRetry(query);
                removeLoadingIndicator(loadingId);
                
                if (response) {
                    // Limpieza agresiva de Markdown residual
                    let cleanText = response
                        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                        .replace(/\*(.*?)\*/g, '<b>$1</b>')
                        .replace(/#{1,6}\s?/g, '')
                        .replace(/-\s/g, '• ');
                    
                    appendMessage(cleanText, 'bot-msg');
                }
            } catch (error) {
                console.error(error);
                removeLoadingIndicator(loadingId);
                appendMessage("He tenido un problema temporal con la conexión. Por favor, intenta de nuevo.", 'bot-msg');
            }
        }

        async function fetchWithRetry(userQuery, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('Network response was not ok');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `${type} message-bubble text-sm`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addLoadingIndicator() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'bot-msg message-bubble text-sm italic text-gray-400';
            div.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-pink-500"></i>Consultando manual...';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoadingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function clearChat() {
            chatBox.innerHTML = '';
            appendMessage("Historial reiniciado. <b>HormonIA</b> está lista de nuevo.", 'bot-msg');
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Asegurar que el scroll esté abajo al cargar
        window.onload = () => chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
